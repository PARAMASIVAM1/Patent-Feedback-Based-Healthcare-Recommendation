        function t(key, data={}) {
            const lang = document.documentElement.lang || 'en';
            let text = TRANSLATIONS[lang][key] || TRANSLATIONS.en[key] || '';
            Object.keys(data).forEach(param => {
                text = text.replace(`{${param}}`, data[param]);
            });
            return text;
        }

        function applyLanguage(lang) {
            if (!TRANSLATIONS[lang]) {
                lang = 'en';
            }
            document.documentElement.lang = lang;
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                const data = {};
                if (el.dataset.i18nPart) {
                    const partKey = el.dataset.i18nPart.replace(/-/g, '_');
                    data.part = TRANSLATIONS[lang]['part_' + partKey] || TRANSLATIONS.en['part_' + partKey] || el.dataset.i18nPart;
                }
                if (el.dataset.i18nAge !== undefined) data.age = el.dataset.i18nAge;
                if (el.dataset.i18nFees !== undefined) data.fees = el.dataset.i18nFees;
                if (el.dataset.i18nLocation !== undefined) data.location = el.dataset.i18nLocation;
                const translated = t(key, data);
                el.textContent = translated;
                if (el.dataset.i18nPlaceholder) {
                    el.placeholder = t(el.dataset.i18nPlaceholder, data);
                }
                if (el.dataset.i18nTitle) {
                    el.title = t(el.dataset.i18nTitle, data);
                }
                if (el.dataset.i18nValue) {
                    el.value = t(el.dataset.i18nValue, data);
                }
            });
            document.querySelectorAll('[data-part-key]').forEach(el => {
                const partKey = el.dataset.partKey.replace(/-/g, '_');
                const label = TRANSLATIONS[lang]['part_' + partKey] || TRANSLATIONS.en['part_' + partKey] || partKey;
                const labelNode = el.querySelector('.part-label');
                if (labelNode) {
                    labelNode.textContent = label;
                } else {
                    el.textContent = label;
                }
            });
            document.querySelectorAll('option[data-i18n]').forEach(option => {
                option.textContent = t(option.dataset.i18n);
            });
            document.title = t('page_title') || document.title;
        }

        function setLanguageCookie(lang) {
            document.cookie = `selected_language=${lang}; path=/; max-age=31536000; samesite=lax`;
        }

        function getLanguageCookie() {
            const match = document.cookie.match(/(?:^|; )selected_language=([^;]+)/);
            return match ? decodeURIComponent(match[1]) : '';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('language-select');
            const saved = localStorage.getItem('selectedLanguage') || getLanguageCookie() || 'en';
            applyLanguage(saved);
            setLanguageCookie(saved);
            if (!select) {
                return;
            }
            select.value = saved;
            select.addEventListener('change', () => {
                localStorage.setItem('selectedLanguage', select.value);
                setLanguageCookie(select.value);
                applyLanguage(select.value);
                document.dispatchEvent(new CustomEvent('languageChanged', { detail: { language: select.value } }));
            });
        });
    </script>
