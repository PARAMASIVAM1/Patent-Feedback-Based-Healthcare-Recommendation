{% extends "base.html" %}
{% block content %}
<section class="login-shell">
    <div class="login-card">
        <span class="eyebrow">Account Recovery</span>
        <h2>Forgot Password</h2>
        <p class="muted">Enter your email and set a new password.</p>

        {% if reset_error %}
        <p class="muted" style="color: #b00020;">{{ reset_error }}</p>
        {% endif %}
        {% if reset_success %}
        <p class="muted" style="color: #1b6e1b;">{{ reset_success }}</p>
        {% endif %}

        <form action="/forgot-password" method="post">
            <label for="reset_email">Email Address</label>
            <input id="reset_email" type="email" name="email" placeholder="Email" required />

            <label for="reset_password">New Password</label>
            <input id="reset_password" type="password" name="password" placeholder="New password" required />

            <label for="reset_confirm_password">Confirm New Password</label>
            <input id="reset_confirm_password" type="password" name="confirm_password" placeholder="Confirm new password" required />

            <button type="submit">Update Password</button>
        </form>

        <div class="actions" style="margin-top: 16px;">
            <a class="button secondary" href="/">Back to Login</a>
        </div>
    </div>
</section>
{% endblock %}
