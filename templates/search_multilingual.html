<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(6, 17, 47, 0.48);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(181, 212, 255, 0.22);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(181, 212, 255, 0.28);
            padding-bottom: 20px;
        }
        
        .header h1 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: rgba(255, 255, 255, 0.78);
            font-size: 16px;
        }
        
        /* Language Selector */
        .language-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .lang-btn {
            padding: 8px 16px;
            border: 2px solid rgba(181, 212, 255, 0.25);
            background: rgba(4, 14, 45, 0.58);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 14px;
            color: #fff;
        }
        
        .lang-btn:hover {
            border-color: rgba(180, 214, 255, 0.95);
            color: #fff;
        }
        
        .lang-btn.active {
            background: rgba(92, 166, 255, 0.84);
            color: #fff;
            border-color: rgba(181, 212, 255, 0.92);
        }
        
        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(181, 212, 255, 0.25);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
            background: rgba(4, 14, 45, 0.58);
            color: #fff;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.12);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        /* Grid Layout */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-row .form-group {
            margin-bottom: 0;
        }
        
        /* Buttons */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0b6662, #10a79f, #7fe6dd);
            color: #fff;
            flex: 1;
            min-width: 150px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::after {
            content: "";
            position: absolute;
            top: -40%;
            left: -30%;
            width: 60%;
            height: 180%;
            background: linear-gradient(120deg, rgba(255,255,255,0.28), rgba(255,255,255,0.06) 40%, rgba(255,255,255,0.02) 60%, transparent 100%);
            transform: rotate(-18deg);
            transition: transform 0.6s ease, opacity 0.4s ease;
            opacity: 0.85;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #0a594f, #0e8f86, #9feee5);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(20, 82, 216, 0.34);
        }

        .btn-primary:hover::after {
            transform: translateX(140%) rotate(-18deg);
            opacity: 0.95;
        }
        
        .btn-secondary {
            background: rgba(4, 14, 45, 0.72);
            color: #fff;
            flex: 1;
            min-width: 150px;
        }
        
        .btn-secondary:hover {
            background: rgba(12, 32, 82, 0.86);
        }
        
        /* Loading State */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn-primary.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary.loading .spinner {
            display: block;
        }
        
        /* Alert Messages */
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-info {
            background: rgba(33, 150, 243, 0.18);
            border-left: 4px solid #7fb6ff;
            color: #d6e8ff;
        }
        
        .alert-success {
            background: rgba(76, 175, 80, 0.18);
            border-left: 4px solid #4CAF50;
            color: #dbf2dc;
        }
        
        .alert-error {
            background: rgba(244, 67, 54, 0.18);
            border-left: 4px solid #f44336;
            color: #ffd6d6;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .language-selector {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 id="pageTitle">Healthcare Recommendation System</h1>
            <p id="pageSubtitle">Find the best doctors for your health needs</p>
        </div>
        
        <!-- Language Selector -->
        <div class="language-selector">
            <button class="lang-btn active" data-lang="en" onclick="switchLanguage('en')">English</button>
            <button class="lang-btn" data-lang="ta" onclick="switchLanguage('ta')">Tamil</button>
            <button class="lang-btn" data-lang="hi" onclick="switchLanguage('hi')">Hindi</button>
            <button class="lang-btn" data-lang="te" onclick="switchLanguage('te')">Telugu</button>
            <button class="lang-btn" data-lang="kn" onclick="switchLanguage('kn')">Kannada</button>
            <button class="lang-btn" data-lang="ml" onclick="switchLanguage('ml')">Malayalam</button>
        </div>
        
        <!-- Main Form -->
        <form method="POST" action="/search" id="searchForm">
            <!-- Feedback Section -->
            <div class="form-group">
                <label for="feedback" id="lblFeedback">Describe Your Experience (Optional)</label>
                <textarea name="feedback" id="feedback" placeholder="Tell us about your experience..."></textarea>
                <small id="feedbackHint" style="color: #999; font-size: 12px; margin-top: 5px; display: block;">
                    💡 Tip: System will analyze your feedback to find the best matching doctors
                </small>
            </div>
            <div class="form-group">
                <label for="rating" id="lblRating">Patient Rating (1-5)</label>
                <input type="number" name="rating" id="rating" min="1" max="5" step="1" placeholder="Give a rating (1-5)">
            </div>
            
            <!-- Body Part Selection -->
            <div class="form-group">
                <label for="part" id="lblBodyPart">Select Body Part</label>
                <select name="part" id="part" required>
                    <option value="">-- Select Body Part --</option>
                    <option value="heart" id="opt-heart">Heart</option>
                    <option value="liver" id="opt-liver">Liver</option>
                    <option value="lungs" id="opt-lungs">Lungs</option>
                    <option value="brain" id="opt-brain">Brain / Neuro</option>
                    <option value="kidney" id="opt-kidney">Kidney</option>
                    <option value="eye" id="opt-eye">Eye</option>
                    <option value="bones" id="opt-bones">Bones</option>
                    <option value="ent" id="opt-ent">ENT</option>
                    <option value="skin-hair" id="opt-skin">Skin & Hair</option>
                    <option value="teeth" id="opt-teeth">Teeth</option>
                    <option value="general" id="opt-general">General</option>
                </select>
            </div>
            
            <!-- Form Row 1: Age, Fees, Location -->
            <div class="form-row">
                <div class="form-group">
                    <label for="age" id="lblAge">Age</label>
                    <input type="number" name="age" id="age" min="1" max="120" placeholder="Enter your age">
                </div>
                
                <div class="form-group">
                    <label for="fees" id="lblFees">Consultation Fees (Rs)</label>
                    <input type="number" name="fees" id="fees" min="0" step="100" placeholder="Maximum budget">
                </div>
                
                <div class="form-group">
                    <label for="location" id="lblLocation">Location</label>
                    <input type="text" name="location" id="location" placeholder="City or area">
                </div>
            </div>
            
            <!-- Form Row 2: Optional Fields -->
            <div class="form-row">
                <div class="form-group">
                    <label for="specialization" id="lblSpecialization">Specialization</label>
                    <input type="text" name="specialization" id="specialization" placeholder="e.g., Cardiologist">
                </div>
                
                <div class="form-group">
                    <label for="disease" id="lblDisease">Disease</label>
                    <input type="text" name="disease" id="disease" placeholder="e.g., Hypertension">
                </div>
                
                <div class="form-group">
                    <label for="doctor_name" id="lblDoctorName">Doctor Name (Optional)</label>
                    <input type="text" name="doctor_name" id="doctor_name" placeholder="Specific doctor">
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-primary">
                    <span id="btnSearch">Find Best Doctors</span>
                </button>
                <button type="reset" class="btn-secondary">
                    <span id="btnClear">Clear Form</span>
                </button>
            </div>
        </form>
    </div>
    
    <!-- Virtual Keyboard Script -->
    <script src="{{ url_for('static', filename='virtual_keyboard.js') }}"></script>
    
    <!-- Language/Translation Script -->
    <script>
        // Get translations from server
        let currentLanguage = 'en';
        let translations = {};
        
        // Load translations
        fetch('/api/translations')
            .then(r => r.json())
            .then(data => {
                translations = data;
                applyTranslations('en');
            })
            .catch(err => console.error('Error loading translations:', err));
        
        function switchLanguage(lang) {
            currentLanguage = lang;
            applyTranslations(lang);
            
            // Update active button
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            
            // Trigger keyboard update
            changeLanguage(lang);
            
            // Update form language
            document.getElementById('part').value = '';
        }
        
        function applyTranslations(lang) {
            const trans = translations[lang] || translations['en'];
            
            // Update page title
            document.getElementById('pageTitle').textContent = trans['page_title'];
            document.getElementById('pageSubtitle').textContent = trans['select_language'];
            
            // Update form labels
            document.getElementById('lblFeedback').textContent = trans['feedback'];
            document.getElementById('lblBodyPart').textContent = trans['select_body_part'];
            document.getElementById('lblAge').textContent = trans['age'];
            document.getElementById('lblFees').textContent = trans['fees'];
            document.getElementById('lblLocation').textContent = trans['location'];
            document.getElementById('lblSpecialization').textContent = trans['specialization'];
            document.getElementById('lblDisease').textContent = trans['disease'];
            document.getElementById('lblDoctorName').textContent = trans['doctor_name'];
            
            // Update buttons
            document.getElementById('btnSearch').textContent = trans['search'];
            document.getElementById('btnClear').textContent = trans['clear'];
            
            // Update body part options
            document.getElementById('opt-heart').textContent = trans['heart'];
            document.getElementById('opt-liver').textContent = trans['liver'];
            document.getElementById('opt-lungs').textContent = trans['lungs'];
            document.getElementById('opt-brain').textContent = trans['brain'];
            document.getElementById('opt-kidney').textContent = trans['kidney'];
            document.getElementById('opt-eye').textContent = trans['eye'];
            document.getElementById('opt-bones').textContent = trans['bones'];
            document.getElementById('opt-ent').textContent = trans['ent'];
            document.getElementById('opt-skin').textContent = trans['skin'];
            document.getElementById('opt-teeth').textContent = trans['teeth'];
            document.getElementById('opt-general').textContent = trans['general'];
            
            // Set HTML dir for RTL languages if needed
            const rtlLanguages = [];
            if (rtlLanguages.includes(lang)) {
                document.documentElement.dir = 'rtl';
            } else {
                document.documentElement.dir = 'ltr';
            }
        }
        
        // Form submission
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = this.querySelector('.btn-primary');
            
            // Add loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            
            // Submit form
            this.submit();
        });
    </script>
</body>
</html>
